name: Deploy Expo web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Official GitHub Pages deployment (source must be set to "GitHub Actions"
# in Settings → Pages). This replaces the old branch-based deploy, which left
# GitHub's legacy "pages build and deployment" builder failing on every push.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          PUBLIC_URL: /${{ github.event.repository.name }}/
        run: npx expo export --platform web --output-dir web-build

      - name: SPA fallback for unknown routes
        run: cp public/404.html web-build/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
